<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" fill="none">
  <!-- Lid / Screen housing -->
  <rect x="120" y="0" width="960" height="640" rx="16" fill="url(#lid-gradient)" stroke="#3a3a3e" stroke-width="1"/>
  
  <!-- Screen bezel -->
  <rect x="128" y="8" width="944" height="624" rx="8" fill="#0a0a0a"/>
  
  <!-- Screen area (transparent for content) -->
  <rect x="134" y="14" width="932" height="612" rx="4" fill="transparent" id="screen-area"/>
  
  <!-- Camera notch -->
  <rect x="560" y="2" width="80" height="10" rx="5" fill="#1a1a1e"/>
  <circle cx="600" cy="7" r="2.5" fill="#2a2a2e" stroke="#3a3a3e" stroke-width="0.5"/>
  
  <!-- Screen glass reflection -->
  <rect x="134" y="14" width="932" height="612" rx="4" fill="url(#glass-reflect)" opacity="0.04"/>
  
  <!-- Hinge shadow -->
  <ellipse cx="600" cy="644" rx="420" ry="3" fill="rgba(0,0,0,0.3)"/>
  
  <!-- Base / Bottom -->
  <path d="M40 648 C40 644 44 640 60 640 L1140 640 C1156 640 1160 644 1160 648 L1160 656 C1160 660 1156 664 1140 664 L60 664 C44 664 40 660 40 656 Z" fill="url(#base-gradient)" stroke="#3a3a3e" stroke-width="0.5"/>
  
  <!-- Base notch/indent -->
  <path d="M520 640 C520 648 524 652 540 652 L660 652 C676 652 680 648 680 640" fill="url(#base-gradient)" stroke="#3a3a3e" stroke-width="0.5"/>
  
  <!-- Bottom rubber feet indicators -->
  <rect x="180" y="660" width="40" height="2" rx="1" fill="#2a2a2e"/>
  <rect x="980" y="660" width="40" height="2" rx="1" fill="#2a2a2e"/>
  
  <defs>
    <linearGradient id="lid-gradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a4a4f"/>
      <stop offset="50%" stop-color="#2d2d32"/>
      <stop offset="100%" stop-color="#1d1d22"/>
    </linearGradient>
    <linearGradient id="base-gradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a3a3e"/>
      <stop offset="50%" stop-color="#2d2d32"/>
      <stop offset="100%" stop-color="#222226"/>
    </linearGradient>
    <linearGradient id="glass-reflect" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.6"/>
      <stop offset="40%" stop-color="white" stop-opacity="0"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>
</svg>
